<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-red: #e60000; --pure-white: #ffffff; --text-dark: #000000; --text-light: #606060; }
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--pure-white); margin: 0; overflow-x: hidden; }

        /* LOADER */
        #loading-overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .loader-circle { width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid var(--main-red); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* HEADER */
        header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #eee; sticky; top: 0; background: white; z-index: 100; }
        .portal-title { font-weight: 900; font-size: 20px; color: var(--text-dark); }

        /* VIDEO PLAYER SECTION (FIXED) */
        #video-player-ui { position: fixed; inset: 0; background: white; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; }
        .back-nav { padding: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden; touch-action: manipulation; }
        video#main-video-player { width: 100%; height: 100%; object-fit: contain; }
        
        /* CUSTOM OVERLAY */
        .video-controls { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: space-between; opacity: 0; transition: opacity 0.3s; z-index: 10; }
        .video-wrapper.show-controls .video-controls { opacity: 1; }
        
        .mid-controls { display: flex; align-items: center; justify-content: center; gap: 50px; flex: 1; color: white; }
        .mid-controls i { font-size: 30px; cursor: pointer; opacity: 0.9; }
        .play-pause-btn { font-size: 50px !important; }

        .bottom-controls { padding: 10px 15px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }
        .progress-container { width: 100%; height: 5px; background: rgba(255,255,255,0.3); border-radius: 3px; cursor: pointer; position: relative; margin-bottom: 8px; }
        .progress-bar { height: 100%; background: var(--main-red); width: 0%; border-radius: 3px; }
        
        .time-row { display: flex; justify-content: space-between; color: white; font-size: 11px; font-family: monospace; }

        /* TAP FEEDBACK */
        .tap-feedback { position: absolute; top: 0; bottom: 0; width: 35%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); opacity: 0; pointer-events: none; transition: 0.2s; color: white; font-size: 24px; border-radius: 50%; }
        .tap-left { left: 0; } .tap-right { right: 0; }
        .tap-active { opacity: 1; }

        /* UI DETAILS */
        .video-info-box { padding: 15px; border-bottom: 1px solid #eee; }
        .video-title { font-size: 18px; font-weight: bold; margin: 0 0 5px 0; }
        .video-stats { font-size: 12px; color: var(--text-light); }
        
        .action-bar { display: flex; justify-content: space-around; padding: 15px 0; border-bottom: 1px solid #eee; }
        .action-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; gap: 5px; }
        
        .channel-row { display: flex; align-items: center; gap: 12px; padding: 15px; }
        .channel-thumb { width: 40px; height: 40px; border-radius: 50%; }
        .sub-btn { background: #000; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 12px; }

        /* LISTING */
        .video-list { padding: 15px; }
        .video-card { display: flex; gap: 12px; margin-bottom: 15px; cursor: pointer; }
        .thumb-placeholder { width: 140px; height: 80px; background: #222; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #555; font-size: 20px; flex-shrink: 0; }
        .video-meta b { font-size: 14px; display: block; line-height: 1.3; }
        .video-meta span { font-size: 11px; color: var(--text-light); }
    </style>
</head>
<body>

    <div id="loading-overlay"><div class="loader-circle"></div></div>

    <header>
        <div class="portal-title">DARK WEB</div>
        <i class="fas fa-search"></i>
    </header>

    <div id="main-feed" class="video-list">
        </div>

    <div id="video-player-ui">
        <div class="back-nav" onclick="closeVideo()"><i class="fas fa-arrow-left"></i> Back to Channel</div>
        
        <div class="video-wrapper" id="player-container">
            <video id="main-video-player" playsinline webkit-playsinline></video>
            
            <div class="video-controls" id="controls-layer">
                <div class="mid-controls">
                    <i class="fas fa-backward" onclick="rewind(event)"></i>
                    <i class="fas fa-play play-pause-btn" id="play-icon" onclick="togglePlay(event)"></i>
                    <i class="fas fa-forward" onclick="forward(event)"></i>
                </div>
                <div class="bottom-controls">
                    <div class="progress-container" onclick="seek(event)">
                        <div class="progress-bar" id="p-bar"></div>
                    </div>
                    <div class="time-row">
                        <span id="time-curr">0:00</span>
                        <span id="time-dur">0:00</span>
                    </div>
                </div>
            </div>
            
            <div class="tap-feedback tap-left" id="f-left"><i class="fas fa-backward"></i></div>
            <div class="tap-feedback tap-right" id="f-right"><i class="fas fa-forward"></i></div>
        </div>

        <div class="video-info-box">
            <h1 class="video-title" id="display-title"></h1>
            <div class="video-stats" id="display-stats"></div>
        </div>

        <div class="action-bar">
            <div class="action-item"><i class="fas fa-thumbs-up"></i> <span id="display-likes"></span></div>
            <div class="action-item"><i class="fas fa-thumbs-down"></i> <span>21K</span></div>
            <div class="action-item"><i class="fas fa-share"></i> <span>Share</span></div>
        </div>

        <div class="channel-row">
            <img src="c9profile.png" class="channel-thumb">
            <div style="flex:1;">
                <b style="font-size:14px;">C9 UZAIR</b><br>
                <span style="font-size:11px; color:var(--text-light);">2.7M Subscribers</span>
            </div>
            <button class="sub-btn">Subscribe</button>
        </div>

        <div style="padding: 10px 15px; font-weight: bold; color: #606060;">Up Next</div>
        <div id="next-videos" class="video-list"></div>
    </div>

    <script>
        const videoData = [
            { id: 1, title: "Murdered His Ex Brutally", views: "12.8M", likes: "1.1M", url: "video1.mp4" },
            { id: 2, title: "Indian Boy Suicide", views: "8.9M", likes: "400K", url: "video2.mp4" },
            { id: 3, title: "14 Transgender Suicide Together", views: "11.1M", likes: "530K", url: "video3.mp4" },
            { id: 4, title: "Death While Singing", views: "9.5M", likes: "460K", url: "video4.mp4" },
            { id: 5, title: "Shooters Killed A Man", views: "14.5M", likes: "715K", url: "video5.mp4" }
        ];

        const v = document.getElementById('main-video-player');
        const container = document.getElementById('player-container');
        const playIcon = document.getElementById('play-icon');
        const progressBar = document.getElementById('p-bar');

        // VIDEO CONTROLS
        function togglePlay(e) {
            if(e) e.stopPropagation();
            if(v.paused) { v.play(); playIcon.className = "fas fa-pause play-pause-btn"; }
            else { v.pause(); playIcon.className = "fas fa-play play-pause-btn"; }
        }

        v.ontimeupdate = () => {
            let pct = (v.currentTime / v.duration) * 100;
            progressBar.style.width = pct + "%";
            document.getElementById('time-curr').innerText = formatTime(v.currentTime);
            document.getElementById('time-dur').innerText = formatTime(v.duration || 0);
        };

        function formatTime(s) {
            let m = Math.floor(s/60);
            s = Math.floor(s%60);
            return m + ":" + (s < 10 ? '0'+s : s);
        }

        function seek(e) {
            let rect = e.currentTarget.getBoundingClientRect();
            let pos = (e.clientX - rect.left) / rect.width;
            v.currentTime = pos * v.duration;
        }

        function rewind(e) { if(e) e.stopPropagation(); v.currentTime -= 10; feedback('left'); }
        function forward(e) { if(e) e.stopPropagation(); v.currentTime += 10; feedback('right'); }

        function feedback(side) {
            let el = document.getElementById('f-' + side);
            el.classList.add('tap-active');
            setTimeout(() => el.classList.remove('tap-active'), 400);
        }

        // DOUBLE TAP & SHOW CONTROLS
        let lastTap = 0;
        let timer;
        container.onclick = (e) => {
            let now = Date.now();
            if(now - lastTap < 300) {
                let rect = container.getBoundingClientRect();
                if(e.clientX - rect.left < rect.width/2) rewind(); else forward();
            } else {
                container.classList.toggle('show-controls');
                clearTimeout(timer);
                if(container.classList.contains('show-controls')) {
                    timer = setTimeout(() => container.classList.remove('show-controls'), 3000);
                }
            }
            lastTap = now;
        };

        // APP LOGIC
        function loadFeed() {
            const feed = document.getElementById('main-feed');
            videoData.forEach(item => {
                feed.innerHTML += `
                    <div class="video-card" onclick="openVideo(${item.id})">
                        <div class="thumb-placeholder"><i class="fas fa-play"></i></div>
                        <div class="video-meta">
                            <b>${item.title}</b>
                            <span>C9 UZAIR • ${item.views} • 1 day ago</span>
                        </div>
                    </div>
                `;
            });
        }

        function openVideo(id) {
            const data = videoData.find(x => x.id === id);
            document.getElementById('loading-overlay').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('video-player-ui').style.display = 'flex';
                document.getElementById('display-title').innerText = data.title;
                document.getElementById('display-stats').innerText = `${data.views} views • 1 day ago`;
                document.getElementById('display-likes').innerText = data.likes;
                
                v.src = data.url;
                v.play();
                playIcon.className = "fas fa-pause play-pause-btn";
                
                // Recommendations
                const next = document.getElementById('next-videos');
                next.innerHTML = '';
                videoData.filter(x => x.id !== id).forEach(item => {
                    next.innerHTML += `
                        <div class="video-card" onclick="openVideo(${item.id})">
                            <div class="thumb-placeholder"><i class="fas fa-play"></i></div>
                            <div class="video-meta">
                                <b>${item.title}</b>
                                <span>C9 UZAIR • ${item.views}</span>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('video-player-ui').scrollTo(0,0);
            }, 800);
        }

        function closeVideo() {
            v.pause();
            document.getElementById('video-player-ui').style.display = 'none';
        }

        window.onload = loadFeed;
    </script>
</body>
</html>
